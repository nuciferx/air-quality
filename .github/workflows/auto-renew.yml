name: Auto-Renew Xiaomi Token

on:
  schedule:
    # Weekly — Monday 02:00 UTC (09:00 Asia/Bangkok).
    # CN-region serviceToken expires in ~7 days, so a 25-day schedule was
    # leaving maxpro/maxdown/cat offline mid-cycle. Weekly keeps CN alive.
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  renew-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run auto-renew script (passToken — no 2FA)
        env:
          XIAOMI_PASS_TOKEN: ${{ secrets.XIAOMI_PASS_TOKEN }}
          WORKER_URL: https://air-quality-api.ideaplanstudio.workers.dev
          WORKER_SECRET: ${{ secrets.LOG_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python auto-renew/renew_token_passtoken.py
