name: Log PM2.5

on:
  schedule:
    - cron: '0 * * * *'   # every hour (UTC)
  workflow_dispatch:

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install micloud requests
      - run: python log_pm25.py
        env:
          XIAOMI_USER_ID:       ${{ secrets.XIAOMI_USER_ID }}
          XIAOMI_SERVICE_TOKEN: ${{ secrets.XIAOMI_SERVICE_TOKEN }}
          XIAOMI_SSECURITY:     ${{ secrets.XIAOMI_SSECURITY }}
          WORKER_URL:           https://air-quality-api.ideaplanstudio.workers.dev
          WORKER_SECRET:        ${{ secrets.LOG_SECRET }}
